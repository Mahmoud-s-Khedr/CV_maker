version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cvmaker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: always
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/cvmaker?schema=public
      - PORT=4000
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_INTEGRATION_ID=${PAYMOB_INTEGRATION_ID}
      - PAYMOB_FRAME_ID=${PAYMOB_FRAME_ID}
      - PAYMOB_HMAC_SECRET=${PAYMOB_HMAC_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - APP_URL=${APP_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - postgres

volumes:
  postgres_data:
