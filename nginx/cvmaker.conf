# HandisCV Nginx Configuration
# Copy to: /etc/nginx/sites-available/cvmaker
# Then: sudo ln -s /etc/nginx/sites-available/cvmaker /etc/nginx/sites-enabled/
# Enable with Certbot: sudo certbot --nginx -d handiscv.muhandis.software

# Upstream backend service
upstream backend {
    server localhost:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name handiscv.muhandis.software;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name handiscv.muhandis.software;

    ssl_certificate /etc/letsencrypt/live/handiscv.muhandis.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/handiscv.muhandis.software/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https:; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self';" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml+rss;
    gzip_min_length 256;
    gzip_vary on;

    # Logging
    access_log /var/log/nginx/cvmaker_access.log;
    error_log /var/log/nginx/cvmaker_error.log;

    # Client upload size limit
    client_max_body_size 50M;

    # Frontend - Serve static files
    location / {
        root /var/www/cvmaker/client/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # Backend API - /api path
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Connection
        proxy_set_header Connection "";
        proxy_buffering off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Allow CORS headers to pass through
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
